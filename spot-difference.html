<body class="page-spot-diff">
  <header class="header">
    <h1>Tìm điểm khác biệt</h1>
    <p class="page-intro">Có 2–3 điểm khác nhau trong hai bức hình. Con hãy bấm vào <strong>hình bên phải</strong> để tìm đủ nhé!</p>

    <div class="spot-diff-topbar" role="group" aria-label="Chọn cặp hình và tiến độ">
      <label class="spot-diff-level-label" for="spotDiffLevelSelect">Cặp hình:</label>
      <select id="spotDiffLevelSelect" class="spot-diff-level-select" aria-label="Chọn cặp hình">
        <!-- Options do JS tạo -->
      </select>
      <span class="spot-diff-progress" id="spotDiffProgress" aria-live="polite">Đã tìm: 0 / 0</span>
    </div>
  </header>

  <main class="game-area spot-diff-area">
    <div class="spot-diff-images" aria-label="Hai bức hình để tìm điểm khác biệt">
      <div class="spot-diff-image">
        <img id="spotDiffImageLeft" class="spot-diff-img" alt="Hình A" loading="eager">
      </div>
      <div class="spot-diff-image spot-diff-image-right" id="spotDiffImageRightWrap">
        <img id="spotDiffImageRight" class="spot-diff-img" alt="Hình B (bấm vào điểm khác biệt)" loading="eager">
        <div id="spotDiffHitLayer" class="spot-diff-hit-layer"></div>
      </div>
    </div>

    <div class="spot-diff-status" id="spotDiffStatus" aria-live="polite"></div>

    <div class="spot-diff-actions">
      <button type="button" class="btn spot-diff-btn spot-diff-btn-replay" id="spotDiffBtnReplay">Chơi lại</button>
      <button type="button" class="btn spot-diff-btn spot-diff-btn-another" id="spotDiffBtnAnother">Cặp khác</button>
    </div>
  </main>

  <footer class="footer">
    <a href="index.html" class="link-home">← Về trang chủ</a>
