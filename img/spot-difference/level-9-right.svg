<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" role="img" aria-label="Canh 9 - Hinh B">
  <rect x="0" y="0" width="600" height="400" fill="#e2e8f0"/>
  <rect x="0" y="280" width="600" height="120" fill="#57534e"/>
  <line x1="0" y1="340" x2="600" y2="340" stroke="#fef3c7" stroke-width="4" stroke-dasharray="20 15"/>
  <!-- Building DIFF: one window different color -->
  <g transform="translate(250 80)">
    <rect x="0" y="0" width="200" height="220" fill="#94a3b8" stroke="#64748b" stroke-width="4"/>
    <rect x="20" y="30" width="45" height="50" fill="#93c5fd" stroke="#3b82f6" stroke-width="2"/>
    <rect x="75" y="30" width="45" height="50" fill="#22c55e" stroke="#16a34a" stroke-width="2"/>
    <rect x="135" y="30" width="45" height="50" fill="#93c5fd" stroke="#3b82f6" stroke-width="2"/>
    <rect x="20" y="100" width="45" height="50" fill="#93c5fd" stroke="#3b82f6" stroke-width="2"/>
    <rect x="75" y="100" width="45" height="50" fill="#f472b6" stroke="#ec4899" stroke-width="2"/>
    <rect x="135" y="100" width="45" height="50" fill="#93c5fd" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <!-- Car DIFF: blue -->
  <g transform="translate(120 300)">
    <rect x="0" y="20" width="100" height="45" rx="8" fill="#3b82f6" stroke="#2563eb" stroke-width="3"/>
    <rect x="15" y="0" width="70" height="25" rx="6" fill="#3b82f6" stroke="#2563eb" stroke-width="2"/>
    <circle cx="25" cy="65" r="12" fill="#292524"/>
    <circle cx="75" cy="65" r="12" fill="#292524"/>
  </g>
  <!-- Traffic light DIFF: green on -->
  <g transform="translate(480 180)">
    <rect x="-18" y="0" width="36" height="90" rx="8" fill="#44403c" stroke="#292524" stroke-width="2"/>
    <circle cx="0" cy="18" r="12" fill="#78716c"/>
    <circle cx="0" cy="45" r="12" fill="#78716c"/>
    <circle cx="0" cy="72" r="12" fill="#22c55e"/>
  </g>
</svg>
