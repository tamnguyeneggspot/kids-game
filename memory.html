<body class="page-memory">
  <header class="header">
    <h1>Game lật thẻ đôi</h1>
    <p class="page-intro">Chơi hai người: thay phiên lật hai thẻ tìm cặp giống nhau. Chọn bộ thẻ Chữ cái, Số hoặc Màu sắc rồi bắt đầu chơi.</p>
    <div class="memory-deck-select" role="group" aria-label="Chọn bộ thẻ">
      <button type="button" class="deck-btn active" data-deck="letters" aria-pressed="true">Chữ cái</button>
      <button type="button" class="deck-btn" data-deck="numbers" aria-pressed="false">Số</button>
      <button type="button" class="deck-btn" data-deck="colors" aria-pressed="false">Màu</button>
    </div>
    <p class="memory-turn" id="memoryTurn" aria-live="polite">Lượt của: Bé 🧒</p>
    <p class="memory-scores" id="memoryScores">Bé: 0 — Người lớn: 0</p>
  </header>

  <main class="game-area">
    <div class="memory-board" id="memoryBoard" role="group" aria-label="Bảng thẻ lật đôi">
      <!-- Thẻ do JS tạo -->
    </div>
    <div class="memory-game-over" id="memoryGameOver" hidden>
      <p>Hết game! Chúc mừng cả hai.</p>
      <button type="button" class="btn" id="memoryBtnReplay">Chơi lại</button>
    </div>
  </main>
