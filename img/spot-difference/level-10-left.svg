<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" role="img" aria-label="Canh 10 - Hinh A">
  <rect x="0" y="0" width="600" height="400" fill="#fce7f3"/>
  <!-- Table -->
  <rect x="100" y="240" width="400" height="20" rx="6" fill="#a16207" stroke="#78350f" stroke-width="3"/>
  <rect x="180" y="260" width="240" height="15" fill="#78716c"/>
  <!-- Cake - 3 candles -->
  <g transform="translate(300 180)">
    <rect x="-60" y="20" width="120" height="55" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
    <rect x="-55" y="0" width="110" height="25" rx="6" fill="#f472b6" stroke="#ec4899" stroke-width="2"/>
    <line x1="-25" y1="-25" x2="-25" y2="5" stroke="#f59e0b" stroke-width="3"/>
    <line x1="0" y1="-30" x2="0" y2="5" stroke="#f59e0b" stroke-width="3"/>
    <line x1="25" y1="-25" x2="25" y2="5" stroke="#f59e0b" stroke-width="3"/>
    <circle cx="-25" cy="-28" r="5" fill="#fde047"/>
    <circle cx="0" cy="-33" r="5" fill="#fde047"/>
    <circle cx="25" cy="-28" r="5" fill="#fde047"/>
  </g>
  <!-- Balloon - red -->
  <g transform="translate(140 120)">
    <path d="M 0 0 C -18 -50 18 -50 0 0 Z" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
    <path d="M 0 0 L 0 35" stroke="#78716c" stroke-width="2"/>
  </g>
  <!-- Gift box - blue -->
  <g transform="translate(450 200)">
    <rect x="-35" y="-20" width="70" height="55" fill="#3b82f6" stroke="#2563eb" stroke-width="3"/>
    <path d="M -35 -20 L 0 5 L 35 -20" fill="none" stroke="#2563eb" stroke-width="2"/>
    <path d="M 0 5 L 0 35" stroke="#2563eb" stroke-width="2"/>
    <rect x="-8" y="-15" width="16" height="12" fill="#fef3c7"/>
  </g>
</svg>
