<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" role="img" aria-label="Canh 1 - Hinh B">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfe9ff"/>
      <stop offset="1" stop-color="#f7fbff"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b7f3c9"/>
      <stop offset="1" stop-color="#86efac"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="600" height="280" fill="url(#sky)"/>
  <rect x="0" y="280" width="600" height="120" fill="url(#grass)"/>

  <!-- Sun (DIFF #1: color + no rays) -->
  <g transform="translate(110 80)">
    <circle cx="0" cy="0" r="40" fill="#f59e0b" stroke="#d97706" stroke-width="6"/>
    <circle cx="-12" cy="-8" r="4" fill="#7c2d12"/>
    <circle cx="12" cy="-8" r="4" fill="#7c2d12"/>
    <path d="M -14 12 Q 0 24 14 12" fill="none" stroke="#7c2d12" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Clouds -->
  <g opacity="0.9">
    <g fill="#ffffff">
      <circle cx="250" cy="70" r="18"/>
      <circle cx="270" cy="62" r="22"/>
      <circle cx="295" cy="72" r="16"/>
      <rect x="238" y="70" width="70" height="22" rx="11"/>
    </g>
    <g fill="#ffffff">
      <circle cx="420" cy="95" r="16"/>
      <circle cx="440" cy="87" r="20"/>
      <circle cx="462" cy="96" r="14"/>
      <rect x="408" y="96" width="66" height="18" rx="9"/>
    </g>
  </g>

  <!-- House -->
  <g transform="translate(230 165)">
    <rect x="0" y="55" width="170" height="125" rx="10" fill="#fff" stroke="#cbd5e1" stroke-width="4"/>
    <path d="M -10 60 L 85 0 L 180 60 Z" fill="#fb7185" stroke="#be123c" stroke-width="5" />
    <rect x="20" y="85" width="55" height="40" rx="6" fill="#93c5fd" stroke="#3b82f6" stroke-width="4"/>
    <line x1="47.5" y1="85" x2="47.5" y2="125" stroke="#3b82f6" stroke-width="4"/>
    <line x1="20" y1="105" x2="75" y2="105" stroke="#3b82f6" stroke-width="4"/>
    <rect x="105" y="95" width="40" height="85" rx="10" fill="#a16207" stroke="#7c2d12" stroke-width="5"/>
    <circle cx="135" cy="140" r="4" fill="#fef3c7"/>
  </g>

  <!-- Tree (DIFF #2: canopy color) -->
  <g transform="translate(400 210)">
    <rect x="-16" y="35" width="32" height="95" rx="12" fill="#a16207" stroke="#7c2d12" stroke-width="5"/>
    <circle cx="0" cy="10" r="56" fill="#06b6d4" stroke="#0891b2" stroke-width="6"/>
    <circle cx="-38" cy="18" r="34" fill="#22d3ee" opacity="0.95"/>
    <circle cx="34" cy="22" r="30" fill="#22d3ee" opacity="0.95"/>
  </g>

  <!-- Flower (DIFF #3: petal color) -->
  <g transform="translate(470 315)">
    <path d="M 0 40 L 0 10" stroke="#16a34a" stroke-width="6" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="10" fill="#fbbf24" stroke="#f59e0b" stroke-width="4"/>
    <g fill="#a855f7" stroke="#7e22ce" stroke-width="3">
      <circle cx="-18" cy="0" r="12"/>
      <circle cx="18" cy="0" r="12"/>
      <circle cx="0" cy="-18" r="12"/>
      <circle cx="0" cy="18" r="12"/>
      <circle cx="-13" cy="-13" r="10"/>
      <circle cx="13" cy="-13" r="10"/>
      <circle cx="-13" cy="13" r="10"/>
      <circle cx="13" cy="13" r="10"/>
    </g>
  </g>

  <!-- Small fence -->
  <g stroke="#a3a3a3" stroke-width="4" stroke-linecap="round">
    <line x1="40" y1="320" x2="200" y2="320"/>
    <line x1="60" y1="290" x2="60" y2="350"/>
    <line x1="95" y1="290" x2="95" y2="350"/>
    <line x1="130" y1="290" x2="130" y2="350"/>
    <line x1="165" y1="290" x2="165" y2="350"/>
  </g>
</svg>
