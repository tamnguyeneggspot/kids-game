<body class="page-ordering">
  <header class="header">
    <h1>Sắp xếp theo thứ tự</h1>
    <p class="page-intro">Chọn chủ đề rồi <strong>click lần lượt</strong> theo thứ tự từ bé đến lớn (1 → 2 → … hoặc A → B → …) nhé!</p>

    <div class="ordering-topic" role="group" aria-label="Chọn chủ đề">
      <span class="ordering-topic-label">Chủ đề:</span>
      <button type="button" class="ordering-topic-btn active" data-topic="numbers" aria-pressed="true">Số 1→10</button>
      <button type="button" class="ordering-topic-btn" data-topic="letters" aria-pressed="false">Chữ A→Z</button>
    </div>
  </header>

  <main class="game-area ordering-area">
    <div class="ordering-status" id="orderingStatus" aria-live="polite">Chọn chủ đề và click các thẻ theo thứ tự.</div>

    <div class="ordering-cards" id="orderingCards" role="group" aria-label="Các thẻ cần sắp xếp theo thứ tự">
      <!-- Thẻ do JS render -->
    </div>

    <div class="ordering-actions">
      <button type="button" class="btn ordering-btn ordering-btn-replay" id="orderingBtnReplay">Chơi lại</button>
      <button type="button" class="btn ordering-btn ordering-btn-topic" id="orderingBtnTopic">Chủ đề khác</button>
    </div>
  </main>
