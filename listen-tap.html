  <meta name="keywords" content="game nghe và chọn, listen and tap cho bé, game giáo dục, học chữ, học số, học màu, game miễn phí cho bé">

  <meta property="og:title" content="Game nghe và chọn đúng cho bé - Listen & tap miễn phí">

<body class="page-listen-tap">
  <header class="header">
    <h1>Nghe và chọn đúng</h1>
    <p class="page-intro">Con nghe phát âm một chữ cái, số hoặc màu rồi chọn đáp án đúng trong các ô bên dưới nhé!</p>

    <div class="listen-tap-topbar" role="group" aria-label="Chọn chủ đề và chế độ chơi">
      <div class="listen-tap-topic" aria-label="Chọn chủ đề">
        <span class="listen-tap-topic-label">Chủ đề:</span>
        <button type="button" class="listen-tap-topic-btn active" data-topic="alphabet" aria-pressed="true">Chữ cái</button>
        <button type="button" class="listen-tap-topic-btn" data-topic="counting" aria-pressed="false">Số</button>
        <button type="button" class="listen-tap-topic-btn" data-topic="color" aria-pressed="false">Màu</button>
      </div>
      <div class="listen-tap-mode" aria-label="Chế độ chơi">
        <span class="listen-tap-mode-label">Chế độ:</span>
        <button type="button" class="listen-tap-mode-btn active" data-mode="continuous" aria-pressed="true">Liên tục</button>
        <button type="button" class="listen-tap-mode-btn" data-mode="5" aria-pressed="false">5 câu</button>
        <button type="button" class="listen-tap-mode-btn" data-mode="10" aria-pressed="false">10 câu</button>
      </div>
    </div>
  </header>

  <main class="game-area listen-tap-area">
    <div class="listen-tap-question" aria-live="polite">
      <button type="button" class="btn listen-tap-btn-hear" id="listenTapBtnHear" aria-label="Phát lại âm thanh">
        <span class="listen-tap-hear-icon" aria-hidden="true">🔊</span>
        <span>Nghe lại</span>
      </button>
      <p class="listen-tap-instruction" id="listenTapInstruction">Chọn chủ đề rồi bấm Nghe lại để bắt đầu.</p>
    </div>

    <div class="listen-tap-choices" id="listenTapChoices" role="group" aria-label="Lựa chọn đáp án">
      <!-- 3–4 nút do JS render -->
    </div>

    <div class="listen-tap-score-wrap" id="listenTapScoreWrap" aria-live="polite" hidden>
      <span class="listen-tap-score" id="listenTapScore">Đúng: 0 / 10</span>
    </div>

    <div class="listen-tap-summary" id="listenTapSummary" aria-live="polite" hidden>
      <p class="listen-tap-summary-text" id="listenTapSummaryText"></p>
      <button type="button" class="btn listen-tap-btn-replay" id="listenTapBtnReplay">Chơi lại</button>
    </div>

    <div class="listen-tap-actions">
      <button type="button" class="btn listen-tap-btn-replay-secondary" id="listenTapBtnReplaySecondary">Chơi lại</button>
    </div>
  </main>

  <footer class="footer">
    <a href="index.html" class="link-home">← Về trang chủ</a>
  </footer>

  <script src="js/music.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/settings-ui.js"></script>
  <script src="js/sfx.js"></script>
  <script src="js/diem.js"></script>
  <script src="js/listen-tap/shared.js"></script>
  <script src="js/listen-tap/game.js"></script>
  <script src="js/listen-tap/main.js"></script>
</body>
</html>
