<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" role="img" aria-label="Canh 5 - Hinh A">
  <defs>
    <linearGradient id="forest" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#86efac"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="600" height="400" fill="url(#forest)"/>
  <!-- Trees background -->
  <rect x="50" y="120" width="80" height="200" fill="#15803d" rx="8"/>
  <rect x="450" y="80" width="70" height="250" fill="#15803d" rx="8"/>
  <rect x="250" y="160" width="100" height="180" fill="#166534" rx="8"/>
  <!-- Bird - blue -->
  <g transform="translate(140 100)" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round">
    <path d="M -15 0 Q 0 -12 15 0"/>
    <path d="M 15 0 Q 30 -12 45 0"/>
  </g>
  <!-- Butterfly - orange -->
  <g transform="translate(380 180)">
    <circle cx="0" cy="0" r="8" fill="#f97316"/>
    <ellipse cx="-25" cy="-5" rx="20" ry="12" fill="#fb923c"/>
    <ellipse cx="25" cy="-5" rx="20" ry="12" fill="#fb923c"/>
    <ellipse cx="-25" cy="5" rx="12" ry="18" fill="#fb923c"/>
    <ellipse cx="25" cy="5" rx="12" ry="18" fill="#fb923c"/>
  </g>
  <!-- Mushroom - red cap -->
  <g transform="translate(480 300)">
    <path d="M -22 0 Q -25 -35 0 -40 Q 25 -35 22 0 Z" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
    <rect x="-8" y="0" width="16" height="45" fill="#fef3c7" stroke="#d6d3d1" stroke-width="2"/>
    <circle cx="-12" cy="-25" r="4" fill="#fff"/>
    <circle cx="8" cy="-15" r="4" fill="#fff"/>
  </g>
</svg>
