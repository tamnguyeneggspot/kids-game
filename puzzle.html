<body class="page-puzzle">
  <header class="header">
    <h1>Ghép hình cho bé</h1>
    <p class="page-intro">Chọn độ khó và hình ảnh. Chỉ mảnh cạnh ô trống mới kéo được; kéo thả vào ô trống (hoặc click mảnh đó) để di chuyển. Ghép xong sẽ có tiếng khen!</p>
    <div class="puzzle-difficulty" role="group" aria-label="Chọn độ khó">
      <button type="button" class="puzzle-diff-btn active" data-pieces="4" aria-pressed="true">4 ô (2×2)</button>
      <button type="button" class="puzzle-diff-btn" data-pieces="9" aria-pressed="false">9 ô (3×3)</button>
    </div>
    <p class="puzzle-board-hint" id="puzzleBoardHint">Bảng hiện tại: 5 ô (gồm 1 ô trống). Chọn nút trên để đổi.</p>
    <div class="puzzle-image-select" role="group" aria-label="Chọn hình ghép">
      <p class="puzzle-image-label">Chọn hình:</p>
      <div class="puzzle-image-grid" id="puzzleImageGrid">
        <!-- Nút chọn ảnh do JS tạo -->
      </div>
    </div>
  </header>

  <main class="game-area">
    <div class="puzzle-board-wrap">
      <div class="puzzle-board" id="puzzleBoard" role="group" aria-label="Bảng ghép hình">
        <!-- Mảnh ghép do JS tạo -->
      </div>
    </div>
    <div class="puzzle-complete" id="puzzleComplete" hidden>
      <p class="puzzle-complete-msg" aria-live="polite">Bé đã ghép xong! 🎉</p>
      <div class="puzzle-complete-actions">
        <button type="button" class="btn puzzle-btn-replay" id="puzzleBtnReplay">Chơi lại</button>
        <button type="button" class="btn puzzle-btn-another" id="puzzleBtnAnother">Hình khác</button>
      </div>
    </div>
  </main>

  <footer class="footer">
