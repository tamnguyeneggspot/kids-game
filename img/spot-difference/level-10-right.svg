<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" role="img" aria-label="Canh 10 - Hinh B">
  <rect x="0" y="0" width="600" height="400" fill="#fce7f3"/>
