<body class="page-connect-dots">
  <header class="header">
    <h1>Nối chấm theo số</h1>
    <p class="page-intro">Chọn hình rồi <strong>click lần lượt</strong> theo thứ tự 1 → 2 → 3 → … để nối các chấm thành hình nhé!</p>

    <div class="connect-dots-shape-row" role="group" aria-label="Chọn hình">
      <label for="connectDotsShape" class="connect-dots-shape-label">Hình:</label>
      <select id="connectDotsShape" class="connect-dots-shape-select" aria-label="Chọn hình để nối chấm">
        <!-- Options do JS điền -->
      </select>
    </div>
  </header>

  <main class="game-area connect-dots-area">
    <div class="connect-dots-status" id="connectDotsStatus" aria-live="polite">Click theo thứ tự 1 → 2 → 3 → … để nối thành hình.</div>

    <div class="connect-dots-canvas-wrap">
      <canvas id="connectDotsCanvas" width="400" height="400" aria-label="Khu vực nối chấm theo số"></canvas>
    </div>

    <p class="connect-dots-hint">Gợi ý: Click theo thứ tự 1 → 2 → 3 → …</p>

    <div class="connect-dots-actions">
      <button type="button" class="btn connect-dots-btn connect-dots-btn-replay" id="connectDotsBtnReplay">Chơi lại</button>
      <button type="button" class="btn connect-dots-btn connect-dots-btn-other" id="connectDotsBtnOtherShape">Hình khác</button>
    </div>
  </main>

  <footer class="footer">
