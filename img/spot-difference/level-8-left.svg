<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" role="img" aria-label="Canh 8 - Hinh A">
  <defs>
    <linearGradient id="grass8" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#86efac"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="600" height="400" fill="url(#grass8)"/>
  <!-- Barn -->
  <g transform="translate(200 120)">
    <path d="M 0 120 L 100 0 L 200 120 Z" fill="#dc2626" stroke="#b91c1c" stroke-width="4"/>
    <rect x="0" y="120" width="200" height="160" fill="#dc2626" stroke="#b91c1c" stroke-width="4"/>
    <rect x="70" y="160" width="60" height="80" fill="#78350f" stroke="#57534e" stroke-width="3"/>
    <!-- Window - 4 panes -->
    <rect x="85" y="100" width="50" height="45" rx="6" fill="#93c5fd" stroke="#3b82f6" stroke-width="3"/>
    <line x1="110" y1="100" x2="110" y2="145" stroke="#3b82f6" stroke-width="2"/>
    <line x1="85" y1="122" x2="135" y2="122" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <!-- Cow - black spots -->
  <g transform="translate(420 260)">
    <ellipse cx="0" cy="0" rx="55" ry="35" fill="#fef3c7" stroke="#78716c" stroke-width="3"/>
    <circle cx="-20" cy="-10" r="18" fill="#292524"/>
    <circle cx="25" cy="5" r="15" fill="#292524"/>
    <circle cx="0" cy="-35" r="8" fill="#292524"/>
  </g>
  <!-- Fence -->
  <g stroke="#a16207" stroke-width="5" fill="none">
    <line x1="0" y1="340" x2="600" y2="340"/>
    <line x1="80" y1="280" x2="80" y2="400"/>
    <line x1="200" y1="280" x2="200" y2="400"/>
    <line x1="320" y1="280" x2="320" y2="400"/>
    <line x1="440" y1="280" x2="440" y2="400"/>
    <line x1="560" y1="280" x2="560" y2="400"/>
  </g>
</svg>
